<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極總經循環判定</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: "微軟正黑體", sans-serif; }
        .verdict-card { border-radius: 15px; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; }
        .data-card { border: none; border-radius: 12px; transition: 0.3s; }
        .val-text { font-size: 1.4rem; font-weight: 800; color: #0d6efd; }
        .yoy-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="card verdict-card shadow mb-4">
        <div class="card-body text-center py-4">
            <h6 class="text-uppercase opacity-75">當前經濟週期判定</h6>
            <h1 class="display-5 fw-bold my-2">{{ results.verdict }}</h1>
            <p class="mb-0 small">更新於：{{ results.timestamp }}</p>
        </div>
    </div>

    <h5 class="mb-3 fw-bold">📊 關鍵指標概覽</h5>
    <div class="row g-3">
        {% for key, item in results.data.items %}
        {% if item %}
        <div class="col-6 col-md-4">
            <div class="card data-card shadow-sm h-100">
                <div class="card-body p-3">
                    <div class="text-muted small mb-1">{{ key|upper }}</div>
                    <div class="val-text">{{ item.val }}</div>
                    {% if item.yoy %}
                    <span class="yoy-badge {% if item.yoy > 0 %}bg-success-subtle text-success{% else %}bg-danger-subtle text-danger{% endif %}">
                        YoY: {{ item.yoy }}%
                    </span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endif %}
        {% endfor %}
    </div>

    <div class="mt-4 d-grid gap-2">
        <a href="?export=json" class="btn btn-dark btn-lg shadow-sm">📥 匯出全數據 (JSON)</a>
        <button onclick="location.reload()" class="btn btn-outline-primary">🔄 重新整理爬蟲</button>
    </div>

    <div class="accordion mt-5" id="theoryAccordion">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
                    📖 檢視週期判定理論背景
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#theoryAccordion">
                <div class="accordion-body small text-secondary">
                    這裡會顯示您之前上傳的所有時期 (復甦、成長、榮景、衰退) 的完整文字說明...
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
